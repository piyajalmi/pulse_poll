<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PulsePoll{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Our Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- Navbar -->
     <nav class=" navbar navbar-expand-lg pp-navbar">
        <div class="container">
            <a class="navbar-brand pp-brand" href="/">
                <i class="bi bi-bar-chaart-line-fill me-2"></i>
                <span class="pulse">Pulse</span><span class="poll">Poll</span>
            </a>
        </div>
     </nav>
    
     <!-- page content -->
      <main>
        {% block content %}{% endblock %}
      </main>

      <!-- Footer -->
       <footer class="pp-footer text-center py-3">
        <small>© 2025 PulsePoll — Anonymous. Instant. Live.</small>
       </footer>

        <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
