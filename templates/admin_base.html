<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Prevent sidebar flash on load -->
    <script>
        if (localStorage.getItem("adminSidebarCollapsed")
            === "true") {
            document.documentElement
                    .classList.add("sidebar-pre-collapsed");
        }
    </script>
    <style>
        .sidebar-pre-collapsed #dbSidebar {
            width: 60px !important;
            transition: none !important;
        }
        .sidebar-pre-collapsed #dbMain {
            margin-left: 60px !important;
            transition: none !important;
        }
        .sidebar-pre-collapsed #dbSidebar span {
            display: none !important;
        }
        .sidebar-pre-collapsed #dbSidebar .db-nav-item {
            justify-content: center !important;
            padding: 12px !important;
        }
    </style>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>
        {% block title %}Admin — PulsePoll{% endblock %}
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
          rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
          rel="stylesheet">
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/dashboard.css') }}">

    {% block extra_css %}{% endblock %}
</head>
<body class="db-body">

    <!-- ── Navbar ────────────────────────────────────── -->
    <nav class="db-navbar">
        <div class="db-navbar-left">
            <i class="bi bi-bar-chart-line-fill"
               style="color:#a5b4fc; font-size:1.3rem;"></i>
            <span class="db-brand">
                <span class="db-brand-pulse">Pulse</span><span class="db-brand-poll">Poll</span>
            </span>
            <!-- Admin badge -->
            <span class="admin-navbar-badge">
                <i class="bi bi-shield-fill me-1"></i>
                Admin
            </span>
        </div>

        <div class="db-navbar-right">
            <span class="db-username">
                <i class="bi bi-person-circle me-2"></i>
                {{ session['user_name'] }}
            </span>
            <div class="db-nav-divider"></div>
            <a href="/logout" class="db-logout-btn">
                <i class="bi bi-box-arrow-right me-1"></i>
                Logout
            </a>
        </div>
    </nav>

    <!-- ── Layout Wrapper ────────────────────────────── -->
    <div class="db-wrapper">

        <!-- ── Sidebar ───────────────────────────────── -->
        <aside class="db-sidebar" id="dbSidebar">
            <nav class="db-sidebar-nav">

                <!-- Dashboard -->
                <a href="/admin/dashboard"
                   class="db-nav-item
                   {% if active_page == 'admin_dashboard' %}
                   active{% endif %}">
                    <i class="bi bi-grid-1x2-fill"></i>
                    <span>Dashboard</span>
                </a>

                <!-- Polls -->
                <a href="/admin/polls"
                   class="db-nav-item
                   {% if active_page == 'admin_polls' %}
                   active{% endif %}">
                    <i class="bi bi-bar-chart-line-fill"></i>
                    <span>Polls</span>
                </a>
                <!-- Users -->
    <a href="/admin/users"
       class="db-nav-item
       {% if active_page == 'admin_users' %}
       active{% endif %}">
        <i class="bi bi-people-fill"></i>
        <span>Users</span>
    </a>
     <a href="/admin/reports"
       class="db-nav-item
       {% if active_page == 'admin_reports' %}
       active{% endif %}">
        <i class="bi bi-graph-up"></i>
        <span>Reports</span>
    </a>

            </nav>

            <!-- Toggle Button -->
            <button class="db-sidebar-toggle"
                    id="sidebarToggle"
                    onclick="toggleSidebar()"
                    title="Toggle Sidebar">
                <i class="bi bi-chevron-left"
                   id="toggleIcon"></i>
            </button>

        </aside>

        <!-- ── Main Content ──────────────────────────── -->
        <main class="db-main" id="dbMain">
            {% block content %}{% endblock %}
        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
    </script>

    {% block extra_js %}{% endblock %}

    <script>
    function toggleSidebar() {
        const sidebar     = document.getElementById("dbSidebar");
        const main        = document.getElementById("dbMain");
        const icon        = document.getElementById("toggleIcon");
        const isCollapsed = sidebar.classList
                                   .contains("collapsed");

        if (isCollapsed) {
            sidebar.classList.remove("collapsed");
            main.classList.remove("collapsed");
            icon.className = "bi bi-chevron-left";
            localStorage.setItem(
                "adminSidebarCollapsed", "false"
            );
        } else {
            sidebar.classList.add("collapsed");
            main.classList.add("collapsed");
            icon.className = "bi bi-chevron-right";
            localStorage.setItem(
                "adminSidebarCollapsed", "true"
            );
        }
    }

    document.addEventListener("DOMContentLoaded",
    function () {
        const isCollapsed = localStorage.getItem(
            "adminSidebarCollapsed"
        );
        if (isCollapsed === "true") {
            const sidebar = document.getElementById("dbSidebar");
            const main    = document.getElementById("dbMain");
            const icon    = document.getElementById("toggleIcon");
            if (sidebar) sidebar.classList.add("collapsed");
            if (main)    main.classList.add("collapsed");
            if (icon)    icon.className = "bi bi-chevron-right";
        }
        document.documentElement
                .classList.remove("sidebar-pre-collapsed");
    });
    </script>

</body>
</html>
