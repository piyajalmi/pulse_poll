<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard — PulsePoll{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Dashboard CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">

    {% block extra_css %}{% endblock %}
</head>
<body class="db-body">

    <!-- ── Navbar ─────────────────────────────────── -->
    <nav class="db-navbar">
        <div class="db-navbar-left">
            <i class="bi bi-bar-chart-line-fill"
               style="color:#a5b4fc; font-size:1.3rem;"></i>
            <span class="db-brand">
                <span class="db-brand-pulse">Pulse</span><span class="db-brand-poll">Poll</span>
            </span>
        </div>

        <div class="db-navbar-right">
            <span class="db-username">
                <i class="bi bi-person-circle me-2"></i>
                {{ session['user_name'] }}
            </span>
            <div class="db-nav-divider"></div>
            <a href="/logout" class="db-logout-btn">
                <i class="bi bi-box-arrow-right me-1"></i>
                Logout
            </a>
        </div>
    </nav>

   <!-- ── Layout Wrapper ─────────────────────────── -->
<div class="db-wrapper">

    <!-- ── Sidebar ────────────────────────────── -->
    <aside class="db-sidebar">          <!-- ← THIS WAS MISSING -->
        <nav class="db-sidebar-nav">

            <!-- Dashboard -->
            <a href="/dashboard"
               class="db-nav-item {% if active_page == 'dashboard' %}active{% endif %}">
                <i class="bi bi-grid-1x2-fill"></i>
                <span>Dashboard</span>
            </a>

            <!-- Polls -->
            <a href="/dashboard/polls"
               class="db-nav-item {% if active_page == 'polls' %}active{% endif %}">
                <i class="bi bi-bar-chart-line-fill"></i>
                <span>Polls</span>
            </a>

        </nav>
    </aside>                            <!-- ← AND CLOSING TAG -->

    <!-- ── Main Content ───────────────────────── -->
    <main class="db-main">
        {% block content %}{% endblock %}
    </main>

</div>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}

</body>
</html>
