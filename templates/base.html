<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PulsePoll{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Our Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- ── Navbar ─────────────────────────────────────── -->
    <nav class="navbar navbar-expand-lg pp-navbar">
        <div class="container">

            <!-- Brand -->
            <a class="navbar-brand pp-brand" href="/">
                <i class="bi bi-bar-chart-line-fill me-2"
                   style="color:#a5b4fc;"></i>
                <span class="pulse">Pulse</span><span class="poll">Poll</span>
            </a>

            <!-- This div pushes everything inside it to the RIGHT -->
    <div class="collapse navbar-collapse" id="ppNavbar">
      <div class="ms-auto d-flex align-items-center gap-4">
        
        <!-- Navigation Links -->
        <div class="navbar-nav d-flex align-items-center gap-3">
          <a class="nav-link text-white px-2" href="/">Home</a>
          <a class="nav-link text-white px-2" href="/polls">Polls</a>
          <a class="nav-link text-white px-2" href="/about">About</a>
          <a class="nav-link text-white px-2" href="/contact">Contact</a>
        </div>

        <!-- Vertical Divider (Optional, looks nice) -->
        <div class="vr d-none d-lg-block" style="background-color: white; height: 40px; opacity: 0.3;"></div>

            <!-- Right side nav items -->
            <div class="d-flex align-items-center gap-3">
          {% if session.get('user_name') %}
            <span style="color:#c7d2fe; font-weight:500;">
              <i class="bi bi-person-circle me-1"></i> {{ session['user_name'] }}
            </span>
            <!-- <a href="/create" class="btn btn-pp-primary btn-sm">
              <i class="bi bi-plus-circle me-1"></i> Create
            </a> -->
            <a href="/logout" style="color:#c7d2fe; font-size:0.9rem; text-decoration:none; font-weight:500;">
              <i class="bi bi-box-arrow-right me-1"></i> Logout
            </a>
          {% else %}
            <a href="/login" style="color:#c7d2fe; font-size:0.9rem; text-decoration:none; font-weight:500;">
              <i class="bi bi-box-arrow-in-right me-1"></i> Login
            </a>
            <a href="/signup" class="btn btn-pp-primary btn-sm">
              <i class="bi bi-person-plus me-1"></i> Sign Up
            </a>
          {% endif %}
            </div>

        </div>
        </div>
        </div>
    </nav>

    <!-- ── Page Content ───────────────────────────────── -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- ── Footer ─────────────────────────────────────── -->
    <footer class="pp-footer text-center py-3">
        <small>© 2025 PulsePoll — Anonymous. Instant. Live.</small>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
