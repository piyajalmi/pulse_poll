
{% extends "base.html" %}

{% block title %}Create Poll — PulsePoll{% endblock %}

{% block content %}
<div class="polls-grid" style="display: flex; gap: 20px; flex-wrap: wrap;">
    {% for poll in polls %}
    <div class="poll-card" style="border: 1px solid #ccc; padding: 15px; border-radius: 8px; width: 300px;">
        <span style="font-size: 0.8rem; color: #666;">Created by: {{ poll['first_name'] }}</span>
        <h3>{{ poll['question'] }}</h3>
        
        <p>Ends on: {{ poll['end_time'] }}</p>
        
        <a href="{{ url_for('view_poll', poll_id=poll['id']) }}" 
           style="display: inline-block; background: #007bff; color: white; padding: 8px 12px; text-decoration: none; border-radius: 4px;">
           View & Vote
        </a>
    </div>
    {% endfor %}
</div>
{% endblock %}
